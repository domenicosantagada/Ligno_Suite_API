# Nome dell'applicazione
spring.application.name=lignosuiteapi
# Configurazione Database H2 (in questo modo i dati vengono salvati in memoria)
#spring.datasource.url=jdbc:h2:mem:falegnameriadb
# Configurazione Database H2 con file locale
spring.datasource.url=jdbc:h2:file:./data/falegnameriadb
# per accedere dal browser all'applicazione h2
# http://localhost:8080/h2-console
spring.datasource.driverClassName=org.h2.Driver
